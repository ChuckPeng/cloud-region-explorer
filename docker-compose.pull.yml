version: "3.8"

# ==================== 从 DockerHub 拉取部署 ====================
# 用法: DOCKERHUB_USERNAME=yourname docker compose -f docker-compose.pull.yml up -d

services:
  app:
    image: ${DOCKERHUB_USERNAME:-your-dockerhub-username}/cloud-region-explorer:latest
    container_name: cloud-region-explorer-app
    volumes:
      - ./data:/app/data
    environment:
      - NODE_ENV=production
      - TZ=Asia/Shanghai
      - CRON_ENABLED=true
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  nginx:
    image: nginx:alpine
    container_name: cloud-region-explorer-nginx
    ports:
      - "8080:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      app:
        condition: service_healthy
    restart: unless-stopped

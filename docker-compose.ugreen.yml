# ============================================================
# Cloud Region Explorer - 绿联云 NAS / 通用 Docker 部署
# ============================================================
#
# 部署:
#   docker compose up -d
# 更新:
#   docker compose pull && docker compose up -d --force-recreate
# 访问:
#   http://<NAS_IP>:8080

services:
  app:
    image: chuckpeng/cloud-region-explorer:beta
    container_name: cloud-region-explorer
    ports:
      - "8080:3000"
    volumes:
      - ./data:/app/data
    environment:
      - NODE_ENV=production
      - TZ=Asia/Shanghai
      - CRON_ENABLED=true
    restart: unless-stopped

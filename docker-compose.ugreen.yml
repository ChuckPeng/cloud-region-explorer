# ============================================================
# Cloud Region Explorer - 绿联云 NAS / 通用 Docker 部署
# 适用: UGOS Pro / UGOS / 任意 Docker 环境
# ============================================================
#
# === 部署（单文件，零依赖）===
#   docker compose -f docker-compose.ugreen.yml up -d
# === 更新镜像 ===
#   docker compose -f docker-compose.ugreen.yml pull
#   docker compose -f docker-compose.ugreen.yml up -d --force-recreate
# === 访问 ===
#   http://<NAS_IP>:8080
#
# === 可选：配合绿联云自带反向代理（更推荐） ===
#   1. 删除下面 nginx 服务，app 添加 ports: "8080:3000"
#   2. UGOS Pro → 控制面板 → 反向代理 → 新建
#      - 来源端口: 8080, 目标: http://localhost:3000

services:
  nginx:
    image: nginx:alpine
    container_name: cloud-region-explorer-nginx
    ports:
      - "8080:80"
    depends_on:
      app:
        condition: service_healthy
    restart: unless-stopped
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        cat > /etc/nginx/nginx.conf << 'EOF'
        events { worker_connections 1024; }
        http {
            server_tokens off;
            limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;
            limit_req_zone $binary_remote_addr zone=collect_limit:10m rate=1r/m;
            limit_conn_zone $binary_remote_addr zone=conn_limit:10m;
            server {
                listen 80;
                add_header X-Content-Type-Options "nosniff" always;
                add_header X-Frame-Options "DENY" always;
                add_header X-XSS-Protection "1; mode=block" always;
                add_header Referrer-Policy "strict-origin-when-cross-origin" always;
                client_max_body_size 1m;
                limit_conn conn_limit 50;
                location / {
                    limit_req zone=api_limit burst=20 nodelay;
                    proxy_pass http://app:3000;
                    proxy_http_version 1.1;
                    proxy_set_header Upgrade $http_upgrade;
                    proxy_set_header Connection "upgrade";
                    proxy_set_header Host $host;
                    proxy_set_header X-Real-IP $remote_addr;
                    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                    proxy_set_header X-Forwarded-Proto $scheme;
                    proxy_buffering off;
                }
                location /api/collect {
                    limit_req zone=collect_limit burst=1 nodelay;
                    limit_req zone=api_limit burst=5 nodelay;
                    proxy_pass http://app:3000;
                    proxy_http_version 1.1;
                    proxy_set_header Host $host;
                    proxy_set_header X-Real-IP $remote_addr;
                    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                    proxy_set_header X-Forwarded-Proto $scheme;
                    proxy_read_timeout 180s;
                }
                location /_next/static {
                    proxy_pass http://app:3000;
                    proxy_cache_valid 200 1h;
                    add_header Cache-Control "public, max-age=3600";
                }
            }
        }
        EOF
        rm -f /etc/nginx/conf.d/default.conf
        exec nginx -g "daemon off;"

  app:
    image: chuckpeng/cloud-region-explorer:beta
    container_name: cloud-region-explorer-app
    volumes:
      - ./data:/app/data
    environment:
      - NODE_ENV=production
      - TZ=Asia/Shanghai
      - CRON_ENABLED=true
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

# ==================== Nginx 反向代理配置 ====================
# 使用方式：在 docker-compose 中添加 nginx 服务
# 或部署到已有 Nginx 服务器时直接引用

events {
    worker_connections 1024;
}

http {
    # 基础安全设置
    server_tokens off;

    # 限流区域：每个 IP 每秒最多 10 个请求（API）
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;

    # 采集接口限流：每个 IP 每 60 秒最多 1 次
    limit_req_zone $binary_remote_addr zone=collect_limit:10m rate=1r/m;

    # 连接数限制
    limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

    server {
        listen 80;
        server_name _;

        # 安全头
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # 客户端请求体大小限制
        client_max_body_size 1m;
        client_body_timeout 10s;
        client_header_timeout 10s;

        # 全局连接限制
        limit_conn conn_limit 50;

        location / {
            # 通用 API 限流
            limit_req zone=api_limit burst=20 nodelay;

            proxy_pass http://app:3000;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # 超时设置
            proxy_connect_timeout 30s;
            proxy_send_timeout 30s;
            proxy_read_timeout 120s;

            # 缓冲设置
            proxy_buffering off;
        }

        # 采集接口特殊限流：更严格
        location /api/collect {
            limit_req zone=collect_limit burst=1 nodelay;
            limit_req zone=api_limit burst=5 nodelay;

            proxy_pass http://app:3000;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_connect_timeout 10s;
            proxy_read_timeout 180s;
        }

        # 静态资源缓存
        location /_next/static {
            proxy_pass http://app:3000;
            proxy_cache_valid 200 1h;
            add_header Cache-Control "public, max-age=3600";
        }
    }
}

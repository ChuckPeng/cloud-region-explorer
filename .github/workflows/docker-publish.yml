name: Docker Build and Push

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

env:
  IMAGE_NAME: cloud-region-explorer

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set image tags
        id: vars
        shell: bash
        run: |
          IMAGE="${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}"
          SHORT_SHA="${GITHUB_SHA::7}"
          TAGS="${IMAGE}:sha-${SHORT_SHA}"

          if [[ "${GITHUB_REF}" == "refs/heads/main" ]]; then
            # main 分支 = 测试通道，始终推 :beta
            TAGS="${TAGS},${IMAGE}:beta"
          fi

          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            VERSION_TAG="${GITHUB_REF#refs/tags/}"
            TAGS="${TAGS},${IMAGE}:${VERSION_TAG}"

            if [[ "${VERSION_TAG}" == *-beta ]]; then
              # beta 版 tag → 同时更新 :beta 流动标签
              TAGS="${TAGS},${IMAGE}:beta"
            else
              # 正式版 tag → 更新 :latest 流动标签
              TAGS="${TAGS},${IMAGE}:latest"
            fi
          fi

          echo "tags=${TAGS}" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.vars.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Cleanup old sha- tags (keep latest 10)
        shell: bash
        run: |
          IMAGE="${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}"
          DOCKERHUB_TOKEN="${{ secrets.DOCKERHUB_TOKEN }}"
          DOCKERHUB_USERNAME="${{ secrets.DOCKERHUB_USERNAME }}"

          # 获取 token
          TOKEN=$(curl -s -H "Content-Type: application/json" \
            -X POST -d "{\"username\":\"${DOCKERHUB_USERNAME}\",\"password\":\"${DOCKERHUB_TOKEN}\"}" \
            https://hub.docker.com/v2/users/login/ | jq -r .token)

          # 获取所有 sha- 标签，按更新时间排序
          TAGS_JSON=$(curl -s -H "Authorization: JWT ${TOKEN}" \
            "https://hub.docker.com/v2/repositories/${IMAGE}/tags/?page_size=100&ordering=last_updated" \
            | jq '[.results[] | select(.name | startswith("sha-"))] | sort_by(.last_updated) | reverse')

          TOTAL=$(echo "$TAGS_JSON" | jq 'length')
          echo "发现 ${TOTAL} 个 sha- 标签，保留最新 10 个"

          if [ "$TOTAL" -gt 10 ]; then
            TO_DELETE=$(echo "$TAGS_JSON" | jq -r '.[10:] | .[].name')
            for TAG in $TO_DELETE; do
              echo "删除: ${IMAGE}:${TAG}"
              curl -s -X DELETE -H "Authorization: JWT ${TOKEN}" \
                "https://hub.docker.com/v2/repositories/${IMAGE}/tags/${TAG}/"
            done
            echo "清理完成"
          else
            echo "无需清理"
          fi

name: Docker Build and Push

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

env:
  IMAGE_NAME: cloud-region-explorer

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set image tags
        id: vars
        shell: bash
        run: |
          IMAGE="${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}"
          SHORT_SHA="${GITHUB_SHA::7}"
          TAGS="${IMAGE}:sha-${SHORT_SHA}"

          VERSION_TAG="${GITHUB_REF#refs/tags/}"
          TAGS="${TAGS},${IMAGE}:${VERSION_TAG}"

          if [[ "${VERSION_TAG}" == *-beta ]]; then
            TAGS="${TAGS},${IMAGE}:beta"
          else
            TAGS="${TAGS},${IMAGE}:latest"
          fi

          echo "All tags: ${TAGS}"
          echo "tags=${TAGS}" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.vars.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Cleanup old sha- tags (keep latest 10)
        shell: bash
        run: |
          IMAGE="${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}"
          DOCKERHUB_TOKEN="${{ secrets.DOCKERHUB_TOKEN }}"
          DOCKERHUB_USERNAME="${{ secrets.DOCKERHUB_USERNAME }}"

          TOKEN=$(curl -s -H "Content-Type: application/json" \
            -X POST -d "{\"username\":\"${DOCKERHUB_USERNAME}\",\"password\":\"${DOCKERHUB_TOKEN}\"}" \
            https://hub.docker.com/v2/users/login/ | jq -r .token)

          TAGS_JSON=$(curl -s -H "Authorization: JWT ${TOKEN}" \
            "https://hub.docker.com/v2/repositories/${IMAGE}/tags/?page_size=100&ordering=last_updated" \
            | jq '[.results[] | select(.name | startswith("sha-"))] | sort_by(.last_updated) | reverse')

          TOTAL=$(echo "$TAGS_JSON" | jq 'length')
          echo "Found ${TOTAL} sha- tags, keeping latest 10"

          if [ "$TOTAL" -gt 10 ]; then
            TO_DELETE=$(echo "$TAGS_JSON" | jq -r '.[10:] | .[].name')
            for TAG in $TO_DELETE; do
              echo "Deleting: ${IMAGE}:${TAG}"
              curl -s -X DELETE -H "Authorization: JWT ${TOKEN}" \
                "https://hub.docker.com/v2/repositories/${IMAGE}/tags/${TAG}/"
            done
            echo "Cleanup done"
          else
            echo "No cleanup needed"
          fi